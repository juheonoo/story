<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘우리 - 하루 세 장 추억 저장</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">친구랑 같이 쓰는 추억장</p>
        <h1>오늘우리</h1>
      </div>
      <button id="themeBtn" class="icon-btn" aria-label="테마 변경">☀️</button>
    </header>

    <section id="themePanel" class="theme-panel card hidden">
      <div class="section-head">
        <h3>테마 설정</h3>
        <span class="hint">추억 느낌으로 바꾸기</span>
      </div>
      <div class="theme-grid">
        <button class="theme-chip" data-theme="classic"><span>🍂</span> 클래식 메모리</button>
        <button class="theme-chip" data-theme="polaroid"><span>📷</span> 폴라로이드</button>
        <button class="theme-chip" data-theme="sunset"><span>🌇</span> 노을</button>
        <button class="theme-chip" data-theme="midnight"><span>🌙</span> 미드나잇</button>
        <button class="theme-chip" data-theme="school"><span>🏫</span> 학교 기록</button>
      </div>
    </section>

    <section class="room-card">
      <div>
        <p class="label">공유 방 코드</p>
        <h2 id="roomCodeText">ROOM-0000</h2>
        <p class="hint">친구가 같은 코드를 입력하면 같은 앨범을 쓰는 구조야.</p>
      </div>
      <div class="room-actions">
        <button id="newRoomBtn">방 만들기</button>
        <button id="joinRoomBtn" class="secondary">코드 입력</button>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="today">오늘</button>
      <button class="tab" data-tab="calendar">달력</button>
      <button class="tab" data-tab="album">앨범</button>
      <button class="tab" data-tab="friend">친구</button>
    </nav>

    <main>
      <section id="today" class="page active">
        <div class="date-row">
          <button id="prevDay">‹</button>
          <div>
            <h2 id="dateTitle"></h2>
            <p id="daySubtitle"></p>
          </div>
          <button id="nextDay">›</button>
        </div>

        <div class="composer card">
          <div class="profile-row">
            <input id="myName" maxlength="12" placeholder="내 이름" />
            <select id="mood">
              <option value="🙂">🙂 좋음</option>
              <option value="😐">😐 보통</option>
              <option value="😴">😴 피곤</option>
              <option value="🔥">🔥 빡공</option>
              <option value="😭">😭 힘듦</option>
              <option value="❤️">❤️ 행복</option>
            </select>
          </div>

          <label class="upload-box">
            <input id="photoInput" type="file" accept="image/*" multiple />
            <span>+ 사진 추가</span>
            <small>하루 최대 3장 · 1장 이상 필수</small>
          </label>

          <div id="previewGrid" class="photo-grid empty"></div>

          <input id="menu" maxlength="60" placeholder="그날 메뉴 (선택) 예: 급식 제육 / 야자 끝 라면" />
          <textarea id="memo" maxlength="200" placeholder="오늘의 기록 (선택)"></textarea>
          <div class="save-row">
            <span id="countText">0/200</span>
            <button id="saveBtn">오늘 기록 저장</button>
          </div>
        </div>

        <section class="card">
          <div class="section-head">
            <h3>이 날의 기록</h3>
            <span id="entryCount">0개</span>
          </div>
          <div id="timeline" class="timeline"></div>
        </section>
      </section>

      <section id="calendar" class="page">
        <div class="card">
          <div class="section-head">
            <button id="prevMonth">‹</button>
            <h3 id="monthTitle"></h3>
            <button id="nextMonth">›</button>
          </div>
          <div class="weekdays">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
      </section>

      <section id="album" class="page">
        <div class="card">
          <div class="section-head">
            <h3>우리 앨범</h3>
            <span id="totalStats"></span>
          </div>
          <input id="searchInput" class="search" placeholder="오늘의 기록, 메뉴, 이름, 날짜 검색" />
          <div id="albumList" class="album-list"></div>
        </div>
      </section>

      <section id="friend" class="page">
        <div class="card">
          <h3>친구 기록 테스트</h3>
          <p class="hint">실제 서버 없이도 공유 화면을 볼 수 있게 친구 기록을 추가하는 데모 기능이야.</p>
          <input id="friendName" placeholder="친구 이름" maxlength="12" />
          <input id="friendMenu" placeholder="친구가 먹은 메뉴 (선택)" maxlength="60" />
          <textarea id="friendMemo" maxlength="160" placeholder="친구 오늘의 기록 (선택)"></textarea>
          <div class="emoji-row">
            <button data-reaction="❤️">❤️</button>
            <button data-reaction="😂">😂</button>
            <button data-reaction="🔥">🔥</button>
            <button data-reaction="😭">😭</button>
          </div>
          <button id="addFriendDemo">친구 기록 추가</button>
        </div>

        <div class="card danger-zone">
          <h3>관리</h3>
          <button id="exportBtn" class="secondary">JSON 백업하기</button>
          <button id="clearBtn" class="danger">현재 방 기록 삭제</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
